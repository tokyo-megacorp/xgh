# Example: Linear API provider (generated by /xgh-track)
# This is a reference example — do NOT copy manually. Run /xgh-track instead.

service: linear
mode: api
base_url: "https://api.linear.app/graphql"
auth:
  type: bearer
  token_env: LINEAR_API_KEY  # Read from ~/.xgh/tokens.env
cursor_strategy: iso8601

# ── Query Templates ────────────────────────────────────────
# Each endpoint maps to a tool role and describes how to fetch,
# paginate, and map items into the inbox format.

endpoints:
  # ASSIGNED TO YOU
  assigned:
    tool: "issues_assigned_to_me"
    query: |
      query ($first: Int, $after: String, $filter: IssueFilter) {
        issues(first: $first, after: $after, filter: $filter) {
          pageInfo { hasNextPage endCursor }
          nodes {
            id title description priority createdAt updatedAt
            assignee { name email }
            state { name }
            team { name key }
          }
        }
      }
    variables:
      filter: 'assignee: { id: "self" } AND createdAt: { gte: "{cursor}" }'
      first: 50
    pagination:
      strategy: cursor
      cursor_field: "pageInfo.endCursor"
    map_to_inbox:
      id: "id"
      title: "title"
      body: "description"
      timestamp: "updatedAt"
      urgency_score: "priority"  # 0-4 scales to urgency
      source: "team.key"
      type: "state.name"

  # MENTIONED IN COMMENTS
  mentions:
    tool: "mentions"
    query: |
      query ($first: Int, $after: String) {
        comments(first: $first, after: $after, 
                 filter: { text: { contains: "@me" } }) {
          pageInfo { hasNextPage endCursor }
          nodes {
            id body createdAt
            issue { id title team { key } }
            user { name email }
          }
        }
      }
    pagination:
      strategy: cursor
      cursor_field: "pageInfo.endCursor"
    map_to_inbox:
      id: "id"
      title: "issue.title"
      body: "body"
      timestamp: "createdAt"
      source: "issue.team.key"
      type: "comment_mention"

  # HIGH-PRIORITY ACROSS TEAMS
  critical:
    tool: "critical_issues"
    query: |
      query ($first: Int, $after: String) {
        issues(first: $first, after: $after,
               filter: { priority: { eq: 4 } AND createdAt: { gte: "{cursor}" } }) {
          pageInfo { hasNextPage endCursor }
          nodes {
            id title priority createdAt updatedAt
            assignee { name }
            state { name }
            team { name key }
          }
        }
      }
    pagination:
      strategy: cursor
      cursor_field: "pageInfo.endCursor"
    map_to_inbox:
      id: "id"
      title: "title"
      timestamp: "updatedAt"
      urgency_score: 4  # Static: always critical
      source: "team.key"

  # COMPLETED RECENTLY (for learning)
  completed:
    tool: "completed_issues"
    query: |
      query ($first: Int, $after: String) {
        issues(first: $first, after: $after,
               filter: { state: { name: "Done" } AND updatedAt: { gte: "{cursor}" } }) {
          pageInfo { hasNextPage endCursor }
          nodes {
            id title completedAt completedBy { name } team { key }
          }
        }
      }
    pagination:
      strategy: cursor
      cursor_field: "pageInfo.endCursor"
    map_to_inbox:
      id: "id"
      title: "title"
      timestamp: "completedAt"
      source: "team.key"
      type: "completed"

# ── Teams & Projects ────────────────────────────────────────
teams:
  - key: "ENG"
    name: "Engineering"
    importance: 1  # Most important
  - key: "OPS"
    name: "Operations"
    importance: 2
  - key: "DES"
    name: "Design"
    importance: 3

# ── Behavior ────────────────────────────────────────────────
options:
  # Retry failed API calls
  retry_on_failure: true
  retry_max_attempts: 3
  
  # Dedup items (Linear IDs are stable)
  dedup_field: "id"
  
  # Log pagination stats for debugging
  log_pagination: true
