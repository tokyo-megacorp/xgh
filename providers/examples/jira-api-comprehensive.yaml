# Jira API Provider — Comprehensive Example
# Generated by: /xgh-track (DO NOT copy manually)
# Regenerate: /xgh-track --regenerate jira-api
#
# This example shows a multi-project, multi-filter Jira API provider.
# Use JQL (Jira Query Language) to define which issues to fetch.
#
# Mode: api (calls Jira REST API endpoints)
# Cursor Strategy: iso8601 (Jira uses RFC 3339 for updated timestamps)

service: jira
mode: api
auth_type: bearer
token_env: JIRA_API_TOKEN  # Reads from ~/.xgh/tokens.env
cursor_strategy: iso8601

# ── API Endpoint Configuration ──────────────────────────────────────────
endpoint:
  # Base URL for your Jira Cloud instance (or self-hosted)
  base_url: "https://your-workspace.atlassian.net"
  
  # Endpoint for issue search
  path: "/rest/api/3/issues/search"
  
  # Method and pagination
  method: "GET"
  pagination:
    strategy: "offset"           # offset, cursor, or page
    param_offset: "startAt"
    param_limit: "maxResults"
    page_size: 50
    max_pages: 20                # Safety limit: fetch at most 1000 issues

# ── Projects to Monitor ─────────────────────────────────────────────────
# Use JQL to filter which issues to fetch. Cursor is injected as {cursor}.

projects:
  # Current sprint + recent backlog items
  - key: ENG
    jql: 'project = ENG AND (sprint in openSprints() OR updated >= "{cursor}")'
    fields: [key, summary, status, assignee, priority, labels, updated]
  
  # High-priority bugs across all projects
  - key: ALL_BUGS
    jql: 'type = Bug AND priority >= High AND updated >= "{cursor}"'
    fields: [key, summary, status, assignee, project, priority, updated]
  
  # Items assigned to you
  - key: MY_WORK
    jql: 'assignee = currentUser() AND updated >= "{cursor}"'
    fields: [key, summary, status, priority, duedate, updated]
  
  # Product roadmap (planning board)
  - key: PRODUCT
    jql: 'project = PRODUCT AND type in (Epic, Story) AND updated >= "{cursor}"'
    fields: [key, summary, status, labels, customfield_10001, updated]  # 10001 = custom roadmap field

# ── Advanced: Custom Field Mapping ──────────────────────────────────────
# Map Jira custom fields to inbox frontmatter keys.
# This helps the analyze skill understand cross-domain semantics.

field_mapping:
  customfield_10001: "roadmap_quarter"  # Your custom roadmap field
  customfield_10002: "effort_points"    # Story points
  customfield_10003: "customer_impact"  # Customer impact flag

# SCENARIO: Engineering team (coordinating sprint work)
#
# projects:
#   - key: ENG
#     jql: 'project = ENG AND (sprint in openSprints() OR updated >= "{cursor}")'
#     # Syncs: current sprint items + recently updated backlog
#
# SCENARIO: Tech lead (overseeing bugs + sprints across teams)
#
# projects:
#   - key: BUGS
#     jql: 'type = Bug AND status != Done AND updated >= "{cursor}"'
#   - key: SPRINTS
#     jql: 'sprint in openSprints() AND updated >= "{cursor}"'
#
# SCENARIO: Product manager (roadmap + customer impact)
#
# projects:
#   - key: ROADMAP
#     jql: 'type in (Epic, Story) AND labels = "roadmap" AND updated >= "{cursor}"'
#     fields: [key, summary, labels, customfield_10003, updated]  # Focus on impact
#
# SCENARIO: SRE (service reliability + incidents)
#
# projects:
#   - key: INCIDENTS
#     jql: 'labels = "incident" AND updated >= "{cursor}"'
#   - key: RELIABILITY
#     jql: 'project = RELIABILITY AND sprint in openSprints()'

# JQL SYNTAX QUICK REFERENCE:
#
# • Updated since cursor:
#     updated >= "{cursor}"
#
# • Current sprint:
#     sprint in openSprints()
#
# • Assigned to you:
#     assignee = currentUser()
#
# • High-priority bugs:
#     type = Bug AND priority >= High
#
# • By label:
#     labels = "roadmap"
#
# • By status:
#     status in (To Do, In Progress)
#
# • Combine with AND/OR:
#     (sprint in openSprints() OR updated >= "{cursor}") AND priority >= High
#
# Full JQL reference: https://support.atlassian.com/jira-cloud-platform/docs/jql-fields/

# TIPS:
#
# • Cursor performance: Start with a small page_size (50) and test.
#   If /xgh-retrieve is slow, increase cursor ticks (5 min → 10 min).
#
# • Custom fields: Your workspace has custom field IDs (customfield_XXXXX).
#   Check Jira admin → Custom Fields → hover over field name to see ID.
#   Map them in field_mapping so analyze can understand them.
#
# • Auth: Requires Jira API token (not password).
#   Create token at https://id.atlassian.com/manage-profile/security/api-tokens
#   Save to ~/.xgh/tokens.env: JIRA_API_TOKEN=xyz...
#
# • Self-hosted Jira: Use your internal URL instead of atlassian.net.
#   Auth: may use basic auth (email:token) instead of bearer.
#
# • Sprint names: openSprints() returns active sprints in the project.
#   For specific sprint by name: sprint = "Sprint 42"
#   For future sprints: sprint in futureSprints()
