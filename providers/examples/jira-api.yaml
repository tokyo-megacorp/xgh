# Example: Jira API provider (Cloud REST API)
# Generated by /xgh-track
# Run /xgh-track to auto-detect Jira and generate this config

service: jira
mode: api
base_url: "https://{YOUR_DOMAIN}.atlassian.net/rest/api/2"
auth:
  type: bearer
  token_env: JIRA_API_TOKEN  # Read from ~/.xgh/tokens.env
cursor_strategy: iso8601

endpoints:
  # Issues assigned to you
  assigned:
    tool: "issues_assigned"
    query_template: |
      /search?jql=assignee%3DcurrentUser()%20AND%20updated%3E%3D{cursor}&maxResults=50&expand=changelog
    pagination:
      strategy: offset
      per_page: 50
      max_results_field: "total"
    map_to_inbox:
      id: "key"
      title: "fields.summary"
      body: "fields.description"
      timestamp: "fields.updated"
      source: "fields.project.key"
      urgency_score: "fields.priority.id"  # 1-5 scale

  # Open bugs in your projects
  bugs:
    tool: "bugs"
    query_template: |
      /search?jql=type%3DBug%20AND%20status%20!%3D%20Done%20AND%20project%20IN%20(ENG%2COPS)%20AND%20updated%3E%3D{cursor}
    map_to_inbox:
      id: "key"
      title: "fields.summary"
      timestamp: "fields.updated"
      type: "bug"
      source: "fields.project.key"

  # Comments mentioning you
  mentions:
    tool: "mentions"
    query_template: |
      /search?jql=comment~currentUser()%20AND%20updated%3E%3D{cursor}&expand=changelog.histories
    map_to_inbox:
      id: "key"
      title: "fields.summary"
      timestamp: "fields.updated"
      type: "mention"

projects:
  - key: "ENG"
    name: "Engineering"
  - key: "OPS"
    name: "Operations"
  - key: "INF"
    name: "Infrastructure"
