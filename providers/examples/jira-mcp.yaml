# ─────────────────────────────────────────────────────────────
# Jira MCP Provider (Atlassian)
# ─────────────────────────────────────────────────────────────
# Mode: mcp (uses Atlassian MCP server — OAuth, covers Jira + Confluence)
# Generated by: /xgh-track
# Regenerate:   /xgh-track --regenerate jira-mcp
#
# Great for: corporate devs with Jira boards
# ─────────────────────────────────────────────────────────────

service: jira
mode: mcp
mcp_server: atlassian
cursor_strategy: iso8601

# ── MCP Tools ────────────────────────────────────────────────
# Roles: list (tickets), comments (ticket comments), search

tools:
  list:
    tool: searchJiraIssuesUsingJQL
    params:
      jql: "project = {project_key} AND updated > '{cursor}' ORDER BY updated ASC"
      limit: 50
  comments:
    tool: getJiraIssueComments
    params:
      issueKey: "{issue_key}"
  search:
    tool: searchJiraIssuesUsingJQL
    params:
      jql: "{query}"
      limit: 20

# ── Projects to monitor ──────────────────────────────────────
projects:
  - key: MOBILE
    name: Mobile Team
  - key: INFRA
    name: Infrastructure
