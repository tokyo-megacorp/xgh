schemaVersion: 1
identifier: xgh
displayName: "XGH — eXtreme Go Horse"
description: "Context-aware AI coding conventions powered by lossless-claude memory and a living context tree."

components:
  - id: vllm-mlx
    type: shell
    command: |
      uv tool install git+https://github.com/waybarrios/vllm-mlx.git
    description: "Local LLM + embeddings server for Apple Silicon (OpenAI-compatible API via vllm-mlx)"
    platform: darwin/arm64
    doctorChecks:
      - shellScript: "command -v vllm-mlx >/dev/null 2>&1"
        label: "vllm-mlx is installed (Apple Silicon only)"

  - id: ollama
    type: shell
    command: |
      curl -fsSL https://ollama.com/install.sh | sh
    description: "Local LLM + embeddings server for Linux/Intel Mac (native Ollama backend)"
    platform: linux
    doctorChecks:
      - shellScript: "command -v ollama >/dev/null 2>&1"
        label: "ollama is installed"
      - shellScript: "systemctl is-active ollama.service >/dev/null 2>&1"
        label: "ollama.service is running"

  - id: remote-inference
    type: connectivity
    description: "External inference server (OpenAI-compatible API)"
    platform: any
    when: "XGH_BACKEND=remote"
    doctorChecks:
      - shellScript: "curl -sf --max-time 5 \"${XGH_REMOTE_URL}/v1/models\" >/dev/null 2>&1"
        label: "Remote inference server is reachable"

  - id: lossless-claude
    type: mcpServer
    command: "lossless-claude"
    args: ["mcp"]
    description: "Two-layer memory MCP server (episodic SQLite + semantic Qdrant)"

  - id: session-start-hook
    type: hook
    hookEvent: SessionStart
    source: plugin/hooks/session-start.sh
    description: "Load context tree and inject conventions at session start. Set XGH_BRIEFING=1 to trigger the briefing skill automatically."

  - id: brief-skill
    type: skill
    source: plugin/skills/brief/brief.md
    description: "Session briefing skill — checks Slack, Jira, and GitHub and produces an actionable summary"

  - id: brief-command
    type: command
    source: plugin/commands/brief.md
    description: "Slash command /xgh-brief — triggers the xgh:brief skill on demand"

  - id: mcp-detect
    type: script
    source: scripts/mcp-detect.sh
    description: "MCP availability detection helpers sourced by workflow skills and hooks"

  - id: prompt-submit-hook
    type: hook
    hookEvent: UserPromptSubmit
    source: plugin/hooks/prompt-submit.sh
    description: "Inject decision table for auto-query/auto-curate behaviour"

  - id: settings
    type: settingsFile
    isRequired: true
    settingsFile: config/settings.json
    description: "Project-level Claude Code settings (permissions, MCP servers)"

  - id: gitignore
    type: gitignore
    isRequired: true
    patterns:
      - ".xgh/local/"
      - "data/cipher-sessions.db*"
      - ".claude/settings.local.json"
    description: "Gitignore rules for local-only and ephemeral files"

  - id: ingest-config-template
    type: configFile
    source: config/ingest-template.yaml
    description: "Central ingest config — edit profile section and run /xgh-track to add projects"

  - id: workspace-write
    type: script
    source: lib/workspace-write.js
    description: "Direct Qdrant write helper — generates embeddings for lossless-claude's semantic layer"

  - id: retrieve-skill
    type: skill
    source: plugin/skills/retrieve/retrieve.md
    description: "Headless retriever loop — scans Slack/Jira/Confluence/GitHub/Figma every 5 min"

  - id: analyze-skill
    type: skill
    source: plugin/skills/analyze/analyze.md
    description: "Headless analyzer loop — classifies, deduplicates, writes to lossless-claude every 30 min"

  - id: track-skill
    type: skill
    source: plugin/skills/track/track.md
    description: "Interactive project onboarding — adds new projects to ingest.yaml"

  - id: doctor-skill
    type: skill
    source: plugin/skills/doctor/doctor.md
    description: "Pipeline health check — config, connectivity, scheduler freshness, workspace stats"

  - id: index-skill
    type: skill
    source: plugin/skills/index/index.md
    description: "Codebase architecture extraction — quick (~5min) and full (~30min) modes"

  - id: calibrate-skill
    type: skill
    source: plugin/skills/calibrate/calibrate.md
    description: "Dedup threshold calibration with F1 scoring — interactive, headless, comparison modes"

  - id: retrieve-command
    type: command
    source: plugin/commands/retrieve.md
    description: "/xgh-retrieve — run retrieval loop (also invoked by scheduler)"

  - id: analyze-command
    type: command
    source: plugin/commands/analyze.md
    description: "/xgh-analyze — run analysis loop (also invoked by scheduler)"

  - id: track-command
    type: command
    source: plugin/commands/track.md
    description: "/xgh-track — add a new project to ingest monitoring"

  - id: doctor-command
    type: command
    source: plugin/commands/doctor.md
    description: "/xgh-doctor — validate full pipeline health"

  - id: index-command
    type: command
    source: plugin/commands/index.md
    description: "/xgh-index [path] [--depth quick|full] — index a codebase"

  - id: calibrate-command
    type: command
    source: plugin/commands/calibrate.md
    description: "/xgh-calibrate [--auto] [--compare] — calibrate dedup threshold"

  - id: help-command
    type: command
    source: plugin/commands/help.md
    description: "Slash command /xgh-help — contextual guide and command reference"

  - id: briefing-skill
    type: skill
    source: plugin/skills/briefing/briefing.md
    description: "Intelligent session briefing — aggregates all sources into a prioritized summary"

  - id: briefing-command
    type: command
    source: plugin/commands/briefing.md
    description: "Slash command /xgh-briefing — full, compact, or focus briefing modes"

  - id: ingest-schedule
    type: script
    source: scripts/ingest-schedule.sh
    description: "Install/uninstall xgh ingest scheduler — launchd on macOS, cron on Linux"

requiredPlugins:
  - id: context-mode
    marketplace: mksglu/context-mode
    plugin: context-mode@context-mode
    description: "Session runtime optimizer — 98% context savings, sandboxed execution, FTS5 search, compaction recovery"
    url: https://github.com/mksglu/context-mode
    integration: |
      Complements xgh by keeping raw tool output out of the context window.
      Route heavy operations (briefing fetches, log analysis) through ctx_execute.
      FTS5 keyword search pairs with lossless-claude vector search for dual-engine retrieval.

optionalPlugins:
  - id: superpowers
    marketplace: claude-plugins-official/superpowers
    plugin: superpowers@superpowers
    description: "Development methodology — TDD, brainstorming, plan writing/execution, subagent-driven development, code review"
    url: https://github.com/obra/superpowers
    integration: |
      xgh workflow skills (investigate, implement-design, implement-ticket) reference
      Superpowers skills (brainstorming, writing-plans, executing-plans, TDD) for
      structured development methodology.

templates:
  - sectionIdentifier: instructions
    contentFile: templates/instructions.md
    placeholders:
      - __TEAM_NAME__
      - __CONTEXT_TREE_PATH__

prompts:
  - key: TEAM_NAME
    type: input
    label: "Team name for lossless-claude memory namespace"
    default: "my-team"
  - key: CONTEXT_TREE_PATH
    type: input
    label: "Path to the context tree directory"
    default: ".xgh/context-tree"

configureProject:
  script: scripts/configure.sh

supplementaryDoctorChecks:
  - shellScript: "curl -sf http://localhost:6333/healthz > /dev/null 2>&1"
    label: "Qdrant is running on localhost:6333"
  - shellScript: "curl -sf http://localhost:11434/v1/models > /dev/null 2>&1"
    label: "vllm-mlx is running on localhost:11434"
  - shellScript: "[ -d \"${MCS_RESOLVED_CONTEXT_TREE_PATH:-.xgh/context-tree}\" ]"
    label: "Context tree directory exists"
