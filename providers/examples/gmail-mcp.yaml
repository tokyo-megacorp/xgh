# ─────────────────────────────────────────────────────────────
# Gmail MCP Provider
# ─────────────────────────────────────────────────────────────
# Mode: mcp (uses Gmail MCP server — Google OAuth)
# Generated by: /xgh-track
# Regenerate:   /xgh-track --regenerate gmail-mcp
#
# Roles: mail (email messages), search (query inbox)
# Great for: anyone who gets work context via email
# ─────────────────────────────────────────────────────────────

service: gmail
mode: mcp
mcp_server: gmail
cursor_strategy: iso8601

tools:
  mail:
    tool: gmail_search_messages
    params:
      query: "is:unread after:{cursor_date}"
      maxResults: 20
  search:
    tool: gmail_search_messages
    params:
      query: "{query}"
      maxResults: 10
  threads:
    tool: gmail_read_thread
    params:
      threadId: "{thread_id}"

# ── Filters ──────────────────────────────────────────────────
# Only fetch emails matching these queries (reduces noise)
filters:
  - "label:work"
  - "from:team@company.com"
  - "subject:deploy OR subject:incident OR subject:review"
