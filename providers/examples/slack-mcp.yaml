# Example: Slack MCP provider (generated by /xgh-track)
# This is a reference example — do NOT copy manually. Run /xgh-track instead.

service: slack
mode: mcp
mcp_server: slack
cursor_strategy: unix_ts

# ── Tool Roles ──────────────────────────────────────────────
# Roles tell the retrieve skill what this provider can do:
#   channels → scan messages in channels
#   threads  → follow thread replies (enables 24h + 7d lookback)
#   search   → free-text search across workspace
# The retrieve skill checks which roles exist and adjusts behavior.

tools:
  # Primary channel monitoring
  channels:
    tool: slack_read_channel
    params:
      channel: "{channel_id}"
      oldest: "{cursor}"
    
  # Thread following (for 1:1 DMs and thread depth)
  threads:
    tool: slack_read_thread
    params:
      channel_id: "{channel_id}"
      ts: "{message_ts}"
    
  # Workspace-wide search
  search:
    tool: slack_search_public_and_private
    params:
      query: "{query}"

# ── Channels to monitor ────────────────────────────────────
channels:
  # CRITICAL — incidents & ops
  - id: C01ABC123
    name: incidents
    priority: critical
    patterns: ["alert:", "pagerduty", "outage"]
    # 1h lookback for this channel (high-volume)
    lookback_hours: 1

  # COLLABORATION — design & planning
  - id: C02DEF456
    name: engineering
    priority: high
    patterns: ["review:", "decision:", "architecture"]
    lookback_hours: 24

  - id: C03GHI789
    name: product-design
    priority: high
    patterns: ["feedback:", "spec:", "design review"]
    lookback_hours: 24

  # INFORMATION — announcements & company updates
  - id: C04JKL012
    name: announcements
    priority: low
    patterns: ["release:", "launch"]
    lookback_hours: 168  # 1 week

  # SOCIAL — watercooler
  - id: C05MNO345
    name: watercooler
    priority: none
    # No patterns — include everything
    lookback_hours: 72

# ── Search Queries ──────────────────────────────────────────
# Auto-run search patterns to find mentions and important themes
searches:
  - query: "from:@me"
    name: "My messages (for context)"
    frequency: "daily"
  
  - query: "@me has:star"
    name: "Starred mentions of me"
    frequency: "daily"
  
  - query: "in:engineering in:incidents"
    name: "Critical + engineering overlap"
    frequency: "12h"
  
  - query: '"decision:" OR "RFC:" OR "ADR:"'
    name: "Architecture decisions"
    frequency: "daily"

# ── DM/1:1 Threads ────────────────────────────────────────
# Follow specific 1:1 threads for unread messages
direct_messages:
  - user_id: U001XYZ  # Your manager/team lead
    name: "Manager sync"
    lookback_hours: 24
  
  - user_id: U002ABC  # Key collaborator
    name: "Key collaborator"
    lookback_hours: 48
