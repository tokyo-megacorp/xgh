# ─────────────────────────────────────────────────────────────
# Discord CLI Provider (via discord.sh or API)
# ─────────────────────────────────────────────────────────────
# Mode: api (calls Discord REST API with curl + jq)
# Generated by: /xgh-track
# Regenerate:   /xgh-track --regenerate discord-api
#
# Roles: channels (messages), threads (forum/thread replies)
# Great for: OSS maintainers with community Discord servers
# ─────────────────────────────────────────────────────────────

service: discord
mode: api
base_url: https://discord.com/api/v10
auth:
  type: bearer
  token_env: DISCORD_BOT_TOKEN  # sourced from ~/.xgh/tokens.env
cursor_strategy: snowflake       # Discord uses snowflake IDs as cursors

endpoints:
  # ── Channel messages (role: channels) ──────────────────────
  - name: messages
    role: channels
    path: /channels/{channel_id}/messages
    method: GET
    params:
      after: "{cursor}"
      limit: 100
    item_mapping:
      source_type: discord_message
      title: "{item.author.username}: {item.content|truncate:80}"
      url: "https://discord.com/channels/{guild_id}/{channel_id}/{item.id}"
      author: "{item.author.username}"
      timestamp: "{item.timestamp}"

  # ── Forum threads (role: threads) ──────────────────────────
  - name: threads
    role: threads
    path: /channels/{channel_id}/threads/search
    method: GET
    params:
      sort_by: last_message_time
      sort_order: desc
      limit: 25

# ── Channels to monitor ──────────────────────────────────────
channels:
  - id: "1234567890"
    name: general
    guild_id: "9876543210"
  - id: "1234567891"
    name: help-forum
    guild_id: "9876543210"
