# Slack MCP Provider — Comprehensive Example
# Generated by: /xgh-track (DO NOT copy manually)
# Regenerate: /xgh-track --regenerate slack-mcp
#
# This example shows a multi-channel, multi-tool Slack provider with real-world patterns.
# Channels are organized by team + function. Tool roles guide the retrieve skill.
#
# Mode: mcp (uses Slack MCP server — OAuth, no bot token needed)
# Cursor Strategy: unix_ts (Slack uses Unix timestamps for messages)

service: slack
mode: mcp
mcp_server: slack
cursor_strategy: unix_ts

# ── MCP Tools ───────────────────────────────────────────────────────────
# Tool roles tell the retrieve skill what capabilities this provider has.
# The skill adjusts its behavior based on which roles exist:
#   - channels: enables channel scanning (1-day lookback by default)
#   - threads: enables thread-following (24h + 7d lookback for context)
#   - search: enables keyword + mention searching (cross-workspace)
#   - list_users: enables user lookups (for mention context)
#
# Each tool declares MCP server method, role, and parameter mapping with {cursor}.

tools:
  channels:
    # Scan channel messages since cursor (typical: 1 day)
    tool: slack_read_channel
    params:
      channel: "{channel_id}"
      oldest: "{cursor}"
  
  threads:
    # Follow replies in a thread (enables 24h lookback + mark as context)
    tool: slack_read_thread
    params:
      channel_id: "{channel_id}"
      ts: "{message_ts}"
  
  search:
    # Free-text search across all channels (find mentions, keywords)
    tool: slack_search_public_and_private
    params:
      query: "{query}"
      oldest: "{cursor}"
  
  list_users:
    # Resolve user IDs to names (for mention context in digest)
    tool: slack_get_users
    params: {}

# ── Channels to Monitor ─────────────────────────────────────────────────
# Channels are grouped by team/function. Each gets a name, ID, and optional filters.
# The fetch.sh script iterates channels and calls the appropriate tool roles.

channels:
  # ── Engineering ─────────────────────────────────────────────────────────
  - id: C01ABC123
    name: engineering
    description: "Main team channel — active PRs, blockers, design discussions"
    thread_lookback_days: 7      # Follow threads for 7 days (default: 1)
    keywords:
      - "blocked"                # Blocker flags
      - "review:"                # Code review requests
      - "deploy"                 # Deployment status
  
  - id: C02DEF456
    name: incidents
    description: "Real-time incident response — high priority"
    thread_lookback_days: 14     # Longer context for incident postmortems
    keywords:
      - "fire"
      - "outage"
      - "degraded"
  
  # ── Product ─────────────────────────────────────────────────────────────
  - id: C03GHI789
    name: product
    description: "Product roadmap, feature requests, customer feedback"
    thread_lookback_days: 3
    keywords:
      - "customer request"
      - "feature idea"
      - "roadmap"
  
  # ── Support ─────────────────────────────────────────────────────────────
  - id: C04JKL012
    name: support
    description: "Customer support tickets, escalations"
    keywords:
      - "escalation"
      - "urgent"
      - "@here"                  # @here mentions = urgent
  
  # ── Random (low priority, spot-check only) ──────────────────────────────
  - id: C05MNO345
    name: random
    description: "General discussion (sampled, not full scan)"
    scan_frequency_minutes: 240  # Check every 4 hours (default: every cursor tick)

# ── Advanced: Mention Monitoring ────────────────────────────────────────
# Search for mentions of you across the workspace, even outside tracked channels.
# This catches:
#   - @you direct mentions
#   - @channel/@here in channels you don't actively watch
#   - Threads where someone replied to your message

watch_mentions:
  - "@me"                        # Your user ID substituted at fetch time
  - "cc:@you"                    # Explicit CC patterns
  - "FYI:"                       # Team convention: "FYI: @user"

# SCENARIO: Small team (5–10 people)
#
# Track: engineering, incidents, product, announcements
# Tools: channels, threads, search (full package)
# Cursor: 1-day rolling window (enough to catch daily updates)
#
# channels:
#   - id: C_ENG
#     name: engineering
#     thread_lookback_days: 3
#   - id: C_PROD
#     name: product
#   - id: C_INCIDENTS
#     name: incidents
#   - id: C_ANNOUNCE
#     name: announcements
#     scan_frequency_minutes: 60  # Once per hour
#
# SCENARIO: Large org (50+ people)
#
# Sampling approach: track only high-priority channels, use keywords to filter noise.
#
# channels:
#   - id: C_CRITICAL
#     name: critical
#     keywords: ["fire", "down", "outage", "blocked", "escalation"]
#     thread_lookback_days: 14
#   - id: C_PRODUCT_LEADERSHIP
#     name: product-leadership-only
#     keywords: ["roadmap", "board", "strategy", "budget"]
#   - id: C_ENGINEERING_PUBLIC
#     name: engineering
#     keywords: ["blocker", "review:"]  # Catch only blockers + reviews
#
# Use watch_mentions to catch ad-hoc @here calls outside tracked channels.
#
# SCENARIO: Cross-functional coordinator
#
# Monitor many channels, organize by team + function. Use keywords to extract
# only high-signal messages (blockers, reviews, escalations, customer issues).
#
# Advantage: Single /xgh-retrieve call syncs all channels. The analyze skill
# can then group inbox items by team (via channel name / keywords).

# TIPS:
#
# • Thread lookback: Controls how deep to search for thread context.
#   - 1 day (default): Fast, covers most active discussions
#   - 7+ days: Capture long-running design discussions, but slower
#   - Per-channel override: incidents=14d, random=0d (no threads)
#
# • Keywords: Use sparingly. These are channel-specific search terms.
#   Common patterns:
#     - "blocked" / "blocker" → impediments
#     - "review:" / "pr:" → code review requests
#     - "fire" / "outage" / "down" → incidents
#     - "escalation" / "urgent" → customer issues
#     - "@here" → high-priority attention calls
#
# • Mention watching: Requires search tool. Searches entire workspace
#   since cursor time. Useful for finding @mentions you'd otherwise miss
#   (e.g., @channel calls in channels outside your regular watches).
#
# • Cursor performance: Slack's search API is slow if searching many channels.
#   If /xgh-retrieve feels slow, consider:
#     - Reduce thread_lookback_days
#     - Drop search tool (remove keywords, use channels + threads only)
#     - Use scan_frequency_minutes to skip some channels on each run
#
# • OAuth scope: The Slack MCP server needs channels:read, chat:read,
#   search:read. Check your workspace permissions.
#   MCP setup: /xgh-track --mode mcp slack
#
# • Private channels: If your Slack workspace uses private channels,
#   ensure the OAuth token has groups:read + chat:read scope.
