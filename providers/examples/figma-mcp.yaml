# ─────────────────────────────────────────────────────────────
# Figma MCP Provider
# ─────────────────────────────────────────────────────────────
# Mode: mcp (uses Figma MCP server)
# Generated by: /xgh-track
# Regenerate:   /xgh-track --regenerate figma-mcp
#
# Roles: files (design changes), comments (design feedback)
# Great for: mobile/frontend devs tracking design updates
# ─────────────────────────────────────────────────────────────

service: figma
mode: mcp
mcp_server: figma
cursor_strategy: iso8601

tools:
  files:
    tool: get_design_context
    params:
      file_key: "{file_key}"
  comments:
    tool: figma_get_comments
    params:
      file_key: "{file_key}"

# ── Files to monitor ─────────────────────────────────────────
files:
  - key: abc123XYZ
    name: "App — Main Screens"
  - key: def456UVW
    name: "Design System v3"
