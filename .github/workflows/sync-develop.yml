name: Sync develop after release

on:
  push:
    branches:
      - main
    paths:
      - package.json

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Open sync PR to develop
    runs-on: ubuntu-latest
    # Only run for release merges — PR titles contain "Release" (e.g. "Release 2.1.1")
    if: contains(github.event.head_commit.message, 'Release') || contains(github.event.head_commit.message, 'release/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check if develop already contains this commit
        id: check
        run: |
          git fetch origin develop main
          if git merge-base --is-ancestor HEAD origin/develop; then
            echo "already_synced=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_synced=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open and merge sync PR
        if: steps.check.outputs.already_synced == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -pe "require('./package.json').version")
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "ERROR: package.json version '$VERSION' is not valid semver" >&2
            exit 1
          fi
          BRANCH="chore/sync-develop-v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git fetch origin "$BRANCH" || true
          git checkout -B "$BRANCH" origin/main
          git push origin "$BRANCH" --force-with-lease

          PR_NUMBER=$(gh pr list \
            --repo "${{ github.repository }}" \
            --base develop \
            --head "$BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [[ -z "$PR_NUMBER" ]]; then
            PR_URL=$(gh pr create \
              --repo "${{ github.repository }}" \
              --base develop \
              --head "$BRANCH" \
              --title "chore: sync develop with main after v${VERSION} release" \
              --body "Automated post-release sync: brings develop up to date with the v${VERSION} release commit on main.")
            PR_NUMBER="${PR_URL##*/}"
          fi

          if [[ -z "$PR_NUMBER" || ! "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "ERROR: Failed to parse PR number (got: '$PR_NUMBER')" >&2
            exit 1
          fi

          gh pr merge "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --merge \
            --auto \
            --delete-branch
