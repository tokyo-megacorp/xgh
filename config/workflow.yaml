# config/workflow.yaml
# Development workflow — source of truth for AGENTS.md workflow section.

test_commands:
  - command: "bash tests/test-config.sh"
    description: "Config files and presets"
  - command: "bash tests/test-skills.sh"
    description: "Skill file existence and content"
  - command: "bash tests/test-commands.sh"
    description: "Command file existence and content"

defaults:
  - question: "Spec location"
    answer: ".xgh/specs/YYYY-MM-DD-<topic>-design.md"
  - question: "Plan location"
    answer: ".xgh/plans/YYYY-MM-DD-<feature>.md"
  - question: "Test command"
    answer: "bash tests/test-config.sh"
  - question: "Branch strategy"
    answer: "feat/*, fix/*, docs/* branch from develop. PRs target develop. main = releases only."
  - question: "Branch prefix"
    answer: "feat/, fix/, docs/ — always branch from develop"
  - question: "Implementation approach"
    answer: "Subagent-driven development (superpowers:subagent-driven-development)"

phases:
  - name: "Design"
    model: opus
    effort: max
    steps:
      - "Search lossless-claude memory for related past work"
      - "Read spec and context tree"
      - "Propose 2-3 approaches, recommend one"
      - "Write design spec to .xgh/specs/"
      - "Write implementation plan to .xgh/plans/"

  - name: "Implementation"
    model: sonnet
    effort: normal
    steps:
      - "Use superpowers:subagent-driven-development"
      - "Fresh subagent per task"
      - "Two-stage review: spec compliance then code quality"

  - name: "Review"
    model: opus
    effort: max
    steps:
      - "Review all implementation against spec"
      - "Run full test suite"
      - "Merge develop → main for release"

superpowers_table:
  - situation: "Starting a task"
    action: "Search context tree + lossless-claude memories"
  - situation: "Making an architectural decision"
    action: "Check .xgh/context-tree/ and .xgh/specs/ first"
  - situation: "Choosing between approaches"
    action: "Use rationalization table pattern; document in spec"
  - situation: "Completing significant work"
    action: "Capture learnings in context tree + lcm_store"
  - situation: "Deviating from a plan"
    action: "Document the reason explicitly in plan file"
  - situation: "Writing new code"
    action: "Check existing patterns in codebase first"
