# config/project.yaml
# Project overview — source of truth for AGENTS.md project section.
# Run scripts/gen-agents-md.sh to regenerate AGENTS.md after changes.

name: xgh
tagline: "xgh: Claude on the fastlane"
emoji: "🐴"

description: |
  xgh is declarative AI ops — declare your agent behavior in YAML, converge every
  AI platform to match. The same way Terraform lets you declare infrastructure,
  xgh lets you declare AI agent behavior and converge every platform to match. It combines:

  - **MAGI** — persistent memory via SQLite + FTS5 for storing and querying
    past decisions, reasoning chains, and patterns
  - **Context Tree** — a git-committed markdown knowledge base (`.xgh/context-tree/`)
    that is human-readable, PR-reviewable, and greppable without special tooling
  - **Context search** — BM25 keyword search over the context tree with scored ranking
    (importance, recency, maturity)
  - **Provider framework** — modular providers in `providers/` (Slack, Jira, GitHub,
    Figma, Confluence); each provider is dynamically generated by Claude reading
    `--help` output, OpenAPI specs, or MCP tool listings — no static spec files required

install: |
  claude plugin install xgh@tokyo-megacorp
  /xgh-init

tech_stack:
  - layer: "Install & hooks"
    technology: "Bash (`set -euo pipefail`)"
  - layer: "Config"
    technology: "YAML, JSON (settings)"
  - layer: "Skills / commands / agents"
    technology: "Markdown (Claude Code format)"
  - layer: "Context tree search"
    technology: "Python 3 (BM25/TF-IDF)"
  - layer: "Persistent memory"
    technology: "MAGI (SQLite + FTS5)"
  - layer: "Provider framework"
    technology: "Reference configs in `providers/examples/`; active generated providers in `~/.xgh/user_providers/`"
  - layer: "Tests"
    technology: "Bash with `assert_*` helpers"

key_design_decisions:
  - title: "Context tree search"
    body: "BM25 keyword search with scored ranking (importance, recency, maturity boost)"
  - title: "Git-committed context tree"
    body: "Knowledge stored as markdown so it's PR-reviewable and shareable without shared infra"
  - title: "Provider framework"
    body: "Providers use `mode: cli` (bash CLI tools) or `mode: api` (HTTP/MCP); Claude dynamically generates provider logic by reading `--help` output, OpenAPI specs, or MCP tool listings; user customizations live in `~/.xgh/user_providers/` and are never overwritten by the installer"
  - title: "Bash-first implementation"
    body: "No custom runtime language needed for Plans 1-3; Python only for BM25 (available on macOS/Linux without install)"

# ── Plugin / skill presets ────────────────────────────────────────────────
# Project-level defaults consumed by xgh skills and compatible plugins.
# Any plugin that supports this convention reads config/project.yaml
# and uses these values as its defaults — user can always override at call time.
#
# This mirrors the superpowers defaults table pattern: a single YAML source
# that all skills/agents in the repo treat as the project's preference registry.
preferences:
  dispatch:
    default_agent: xgh:dispatch   # auto-route by default
    fallback_agent: xgh:codex     # if dispatch can't determine best fit
    exec_effort: high
    review_effort: normal

  pair_programming:
    enabled: true               # true | false
    tool: "xgh:dispatch"        # xgh:dispatch | xgh:codex | xgh:gemini | xgh:opencode
    effort: high                # low | medium | high
    phases: [design, per_task]  # when to pair: design phase, before each impl task, or both

  vcs:
    commit_format: "<type>: <description>"
    branch_naming: "<type>/<description>"
    pr_template: ""

  scheduling:
    retrieve_interval: "30m"
    analyze_interval: "1h"
    quiet_hours: ""

  notifications:
    delivery: "inline"
    batching: false
    suppress_below: ""

  retrieval:
    depth: "normal"
    max_age: "7d"
    context_tree_sync: true

  testing:
    timeout: "120"
    required_suites: []
    skip_rules: []

  superpowers:
    implementation_model: sonnet
    review_model: opus
    effort: normal              # low | normal | high | max

  design:
    model: opus
    effort: max

  agents:
    default_model: sonnet       # fallback model for agent frontmatter with model: inherit

  pr:
    provider: github
    repo: tokyo-megacorp/xgh
    reviewer: copilot-pull-request-reviewer[bot]
    reviewer_comment_author: Copilot
    review_on_push: true
    merge_method: squash
    auto_merge: true
    branches:
      main:
        merge_method: merge
        required_approvals: 1
      develop:
        merge_method: squash

# ── Profile overrides ────────────────────────────────────────────────────────
# Optional: define named profiles that overlay the preferences above.
# Activate a profile: write the profile name to ~/.xgh/active-profile
# Deactivate: remove ~/.xgh/active-profile  (empty/missing = use project defaults)
#
# Each profile may override any subset of preferences. Precedence order:
#   CLI override > profile override > branch override > project default
#
# profiles:
#   work:
#     description: "Work context — internal repos, strict scheduling"
#     preferences:
#       pr:
#         repo: company/internal-repo
#         merge_method: squash
#       scheduling:
#         retrieve_interval: "15m"
#   personal:
#     description: "Personal projects — open source, relaxed scheduling"
#     preferences:
#       scheduling:
#         retrieve_interval: "60m"

