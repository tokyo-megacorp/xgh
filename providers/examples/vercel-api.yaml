# Example: Vercel API provider
# Monitors deployments, builds, and analytics
# Generated by /xgh-track

service: vercel
mode: api
base_url: "https://api.vercel.com"
auth:
  type: bearer
  token_env: VERCEL_API_TOKEN
cursor_strategy: iso8601

endpoints:
  # Recent deployments
  deployments:
    tool: "deployments"
    query_template: "/v13/deployments?projectId={project_id}&limit=20&until={cursor_ts}"
    pagination:
      strategy: timestamp
      cursor_field: "createdAt"
    map_to_inbox:
      id: "uid"
      title: "name"
      body: "url"
      timestamp: "createdAt"
      type: "deployment"
      urgency_score: "4 if state == 'FAILED' else 1"  # Errors are critical

  # Build errors
  builds:
    tool: "builds"
    query_template: "/v0/projects/{project_id}/builds?limit=20&state=ERROR&from={cursor_ts}"
    map_to_inbox:
      id: "id"
      title: "name"
      timestamp: "createdAt"
      type: "build_error"
      urgency_score: 4

  # Analytics (if configured)
  analytics:
    tool: "analytics"
    query_template: "/v1/projects/{project_id}/analytics?since={cursor_ts}"
    map_to_inbox:
      title: "Site metrics (tail)"
      body: "topPaths, topErrors"
      timestamp: "timestamp"
      type: "analytics"

projects:
  - id: "prj_abc123"
    name: "my-app-prod"
    importance: 1
  - id: "prj_def456"
    name: "my-app-staging"
    importance: 2
  - id: "prj_ghi789"
    name: "my-docs"
    importance: 3
