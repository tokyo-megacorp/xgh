# GitHub CLI Provider — Comprehensive Example
# Generated by: /xgh-track (DO NOT copy manually)
# Regenerate: /xgh-track --regenerate github-cli
#
# This example shows a multi-repo, multi-source GitHub provider with real-world patterns.
# Adapt repos, sources, and watch filters to your team's needs.
#
# Mode: cli (uses `gh` binary — no tokens needed, auth via `gh auth login`)
# Cursor Strategy: iso8601 (GitHub uses RFC 3339 timestamps)

service: github
mode: cli
binary: gh
cursor_strategy: iso8601

# ── Main Repos ──────────────────────────────────────────────────────────
# Each repo declares which sources to fetch. The fetch.sh script translates
# each source to a `gh` CLI command:
#   - pull_requests  → gh pr list --search "updated:>{CURSOR}"
#   - issues         → gh issue list --search "updated:>{CURSOR}"
#   - actions        → gh run list --created ">{CURSOR}"
#   - discussions    → gh api graphql (with discussion query)
#   - releases       → gh release list --json "publishedAt,name,body"
#   - security_alerts→ gh api /repos/O/R/dependabot/alerts
#   - mentions       → gh search issues --mention @me updated:>{CURSOR}

repos:
  # Flagship project — all sources, watch important PRs
  - owner: tokyo-megacorp
    repo: xgh
    sources: [issues, pull_requests, discussions, actions, security_alerts, releases]
    watch_prs:
      - 19                        # PR number (literal watch)
      - "search:trigger"          # Search query for "trigger" — flags design PRs
      - "search:is:draft"         # Flag draft PRs for visibility
    watch_issues:
      - "search:type:bug"         # High-priority bug reports
      - "search:has:assignee"     # Self-assigned issues

  # Partner repo — focused on integrations
  - owner: mksglu
    repo: context-mode
    sources: [issues, pull_requests, releases, mentions]
    watch_prs:
      - 136
      - "search:label:breaking-change"  # Catch API-breaking PRs early
    watch_issues:
      - "search:label:priority/critical"

  # Dependency tracking — releases only (lower signal noise)
  - owner: rtk-ai
    repo: rtk
    sources: [releases]

  # Framework repo — security alerts + discussions
  - owner: anthropics
    repo: anthropic-sdk
    sources: [releases, security_alerts, discussions]

# ── Optional: Global Filters ────────────────────────────────────────────
# These apply to all repos (overridable per-repo if needed):
#
# state_filter: "open"                    # "open", "closed", "all" (default: "all")
# labels_include: ["urgent", "team"]      # Match any label (OR logic)
# labels_exclude: ["wontfix"]             # Skip issues with these labels (AND logic)
# assignee_filter: ["tokyo-megacorp", "pedro"]    # Match any assignee (OR logic)

# ── Advanced: Notifications (Global) ────────────────────────────────────
# Unlike repo-specific sources, notifications span your entire GitHub account:
watch_notifications:
  - "is:unread"                  # Unread notifications only
  - "reason:mention"             # You were @mentioned
  - "reason:assign"              # Assigned directly
  - "reason:review_requested"    # Code review requested

# SCENARIO: Solo developer tracking multiple active projects
#
# Replace repos with your active projects. For each:
#   - Include pull_requests + issues for active development
#   - Include security_alerts for dependencies
#   - Include releases for dependency updates
#   - watch_prs: literal numbers for high-impact PRs under review
#   - watch_prs: "search:..." for patterns (draft, breaking, etc.)
#
# SCENARIO: Team lead + triage responsibility
#
# Add filtering by labels and assignees to surface high-priority work:
#   watch_issues:
#     - "search:label:priority/p0"
#     - "search:author:external"   # External contributor PRs
#
# SCENARIO: Framework maintainer (many repos, high-signal filtering)
#
# Limit sources to avoid notification overload:
#   sources: [issues, pull_requests, discussions]  # Skip actions + security
#   watch_issues:
#     - "search:label:bug"         # Only bug reports
#     - "search:is:regression"     # Regressions get priority
#
# SCENARIO: Dependency scanning (enterprises)
#
# Security alerts only for critical repos:
#   - owner: company
#     repo: core-api
#     sources: [security_alerts]
#     label_exclude: ["dependency:internal"]  # Skip internal deps
#
# Then use /xgh-analyze to synthesize alerts into a digest.

# TIPS:
#
# • Watch filters use GitHub search syntax (https://github.com/search/syntax)
#   Common patterns:
#     - "search:draft"        → is:draft in search
#     - "search:breaking"     → breaking change in title/body
#     - "search:label:X"      → label:X
#     - "search:author:@user" → author:@user (external contributors)
#
# • Cursor performance: GitHub's search API has a 1000-result limit.
#   If you're syncing >1000 updates between cursor ticks, consider:
#     - Splitting repos into separate /xgh-track calls
#     - Narrowing sources (drop actions/discussions if high volume)
#     - Running /xgh-retrieve more frequently (5-min CronCreate default)
#
# • Private repos: Must have gh auth token with `repo` scope.
#   Check: gh auth status
#   Refresh: gh auth login
#
# • For archived repos: GitHub search excludes archived by default.
#   If you need them, watch_prs/watch_issues must use explicit repo filter:
#     - "search:repo:owner/archived-repo is:pr"
