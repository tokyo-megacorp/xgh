# ─────────────────────────────────────────────────────────────
# Vercel API Provider
# ─────────────────────────────────────────────────────────────
# Mode: api (calls Vercel REST API)
# Generated by: /xgh-track
# Regenerate:   /xgh-track --regenerate vercel-api
#
# Roles: deployments (deploy status), alerts (build failures)
# Great for: frontend/fullstack devs deploying to Vercel
# ─────────────────────────────────────────────────────────────

service: vercel
mode: api
base_url: https://api.vercel.com
auth:
  type: bearer
  token_env: VERCEL_TOKEN
cursor_strategy: iso8601

endpoints:
  # ── Deployments (role: deployments) ────────────────────────
  - name: deployments
    role: deployments
    path: /v6/deployments
    method: GET
    params:
      since: "{cursor_unix_ms}"
      limit: 20
      projectId: "{project_id}"
    pagination:
      type: offset
      next_field: pagination.next
    item_mapping:
      source_type: vercel_deployment
      title: "{item.meta.githubCommitMessage|truncate:80}"
      url: "https://vercel.com/{team}/{project}/{item.id}"
      author: "{item.creator.username}"
      timestamp: "{item.createdAt}"

projects:
  - id: prj_abc123
    name: my-website
  - id: prj_def456
    name: docs-site
