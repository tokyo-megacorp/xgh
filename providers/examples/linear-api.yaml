# ─────────────────────────────────────────────────────────────
# Linear API Provider
# ─────────────────────────────────────────────────────────────
# Mode: api (calls REST/GraphQL endpoints with curl + jq)
# Generated by: /xgh-track
# Regenerate:   /xgh-track --regenerate linear-api
#
# Auth: bearer token from ~/.xgh/tokens.env (LINEAR_API_KEY)
# ─────────────────────────────────────────────────────────────

service: linear
mode: api
base_url: https://api.linear.app
auth:
  type: bearer
  token_env: LINEAR_API_KEY   # sourced from ~/.xgh/tokens.env
cursor_strategy: iso8601

# ── Endpoints ────────────────────────────────────────────────
# Each endpoint maps to a tool role and describes how to fetch,
# paginate, and map items into the inbox format.

endpoints:
  # ── Issues (role: list) ────────────────────────────────────
  - name: issues
    role: list
    path: /issues
    method: GET
    params:
      filter: '{"updatedAt": {"gt": "{cursor}"}}'
      first: 50
    pagination:
      type: cursor
      next_field: pageInfo.endCursor
      has_more_field: pageInfo.hasNextPage
    item_mapping:
      source_type: linear_issue
      title: "{item.title}"
      url: "{item.url}"
      author: "{item.creator.name}"
      timestamp: "{item.updatedAt}"

  # ── Comments (role: comments) ──────────────────────────────
  - name: comments
    role: comments
    path: /comments
    method: GET
    params:
      filter: '{"updatedAt": {"gt": "{cursor}"}}'
      first: 50
    pagination:
      type: cursor
      next_field: pageInfo.endCursor
      has_more_field: pageInfo.hasNextPage
    item_mapping:
      source_type: linear_comment
      title: "Comment on: {item.issue.title}"
      url: "{item.issue.url}"
      author: "{item.user.name}"
      timestamp: "{item.updatedAt}"
