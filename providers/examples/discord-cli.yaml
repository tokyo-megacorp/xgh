# Example: Discord CLI provider
# Uses discord.py or a Discord CLI tool for message fetching
# Generated by /xgh-track

service: discord
mode: cli
binary: discord-cli  # or custom script wrapping discord.py
cursor_strategy: iso8601

# Discord Server/Guild ID → Channel list mapping
servers:
  - id: "987654321098765432"  # Server guild ID
    name: "My Community"
    
    # Channels to monitor in this server
    channels:
      - id: "111111111111111111"
        name: "announcements"
        priority: high
        lookback_hours: 24
      
      - id: "222222222222222222"
        name: "engineering"
        priority: high
        lookback_hours: 12
        
      - id: "333333333333333333"
        name: "general"
        priority: low
        lookback_hours: 24

# Direct Message threads to monitor
direct_messages:
  - user_id: "456789012345678901"
    username: "tech_lead"
    lookback_hours: 24

# Search patterns (if your CLI supports them)
search_terms:
  - "mention:me"
  - "has:reaction"
  - "question:"
