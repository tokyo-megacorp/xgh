# ─────────────────────────────────────────────────────────────
# Slack MCP Provider
# ─────────────────────────────────────────────────────────────
# Mode: mcp (uses Slack MCP server — OAuth, no bot token needed)
# Generated by: /xgh-track
# Regenerate:   /xgh-track --regenerate slack-mcp
#
# Tool roles tell the retrieve skill what this provider can do:
#   channels → scan messages in channels
#   threads  → follow thread replies (enables 24h + 7d lookback)
#   search   → free-text search across workspace
# ─────────────────────────────────────────────────────────────

service: slack
mode: mcp
mcp_server: slack
cursor_strategy: unix_ts

# ── MCP Tools ────────────────────────────────────────────────
# Keys are convention-based roles. The retrieve skill checks
# which roles exist and adjusts its behavior accordingly:
#   - "channels" present → runs channel scan pass
#   - "threads" present  → runs thread-following logic
#   - "search" present   → runs mention/keyword search

tools:
  channels:
    tool: slack_read_channel
    params:
      channel: "{channel_id}"
      oldest: "{cursor}"
  threads:
    tool: slack_read_thread
    params:
      channel_id: "{channel_id}"
      ts: "{message_ts}"
  search:
    tool: slack_search_public_and_private
    params:
      query: "{query}"

# ── Channels to monitor ──────────────────────────────────────
channels:
  - id: C01ABC123
    name: engineering
  - id: C02DEF456
    name: incidents
  - id: C03GHI789
    name: deployments
