# ─────────────────────────────────────────────────────────────
# GitHub CLI Provider
# ─────────────────────────────────────────────────────────────
# Mode: cli (uses `gh` binary — no tokens needed, auth via gh auth login)
# Generated by: /xgh-track
# Regenerate:   /xgh-track --regenerate github-cli
# ─────────────────────────────────────────────────────────────

service: github
mode: cli
binary: gh
cursor_strategy: iso8601

# ── Repos ────────────────────────────────────────────────────
# Each repo declares which data sources to fetch and optional
# filters. Sources map to gh CLI commands:
#
#   pull_requests  → gh pr list --search "updated:>CURSOR"
#   issues         → gh issue list --search "updated:>CURSOR"
#   actions        → gh run list --created ">CURSOR"
#   security_alerts→ gh api /repos/O/R/dependabot/alerts
#   discussions    → gh api graphql (discussions query)
#   releases       → gh release list
#   mentions       → gh search issues --mention @me
#   notifications  → gh api /notifications (global, not per-repo)

repos:
  # ── Owned repo: full visibility ────────────────────────────
  - owner: ipedro
    repo: xgh
    sources:
      - issues
      - pull_requests
      - discussions
      - actions
      - security_alerts
      - releases
    watch_prs: [19]           # Always fetch these PRs regardless of cursor

  # ── Contributor: filtered by topic ─────────────────────────
  - owner: mksglu
    repo: context-mode
    sources:
      - issues
      - pull_requests
      - releases
      - mentions              # Only @ipedro mentions
    watch_prs:
      - 136                   # Specific PR number
      - "search:openclaw"     # Search query — fetches PRs matching "openclaw"
    watch_issues:
      - "search:openclaw"     # Only openclaw-labeled issues

  # ── Dependency: just track releases ────────────────────────
  - owner: rtk-ai
    repo: rtk
    sources:
      - releases
      - issues

  # ── Observer: monitor for ideas ────────────────────────────
  - owner: volcengine
    repo: OpenViking
    sources:
      - releases
      - pull_requests
