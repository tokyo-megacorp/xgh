# xgh BYOP preset: local (default)
# Free, fully offline, no API keys needed
# Requires vllm-mlx running: bash scripts/start-models.sh
llm:
  provider: openai
  model: mlx-community/Llama-3.2-3B-Instruct-4bit
  baseUrl: http://localhost:11434/v1
  apiKey: placeholder
embeddings:
  provider: openai
  model: mlx-community/nomicai-modernbert-embed-base-8bit
  baseUrl: http://localhost:11434/v1
  apiKey: placeholder
vector_store:
  type: qdrant
  url: http://localhost:6333
