name: validation
description: implement -> validate -> remediate gate
roles:
  implementer: codex
  validator: claude-code
steps:
  - id: implement
    owner: implementer
    output: implementation.patch
  - id: validate
    owner: validator
    output: validation-report.md
  - id: remediate
    owner: implementer
    output: remediation.patch
acceptance:
  - failing checks resolved
  - regression tests pass
