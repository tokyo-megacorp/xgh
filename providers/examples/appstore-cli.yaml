# ─────────────────────────────────────────────────────────────
# App Store Connect CLI Provider
# ─────────────────────────────────────────────────────────────
# Mode: cli (uses Apple's `xcrun altool` or `appstoreconnect` CLI)
# Generated by: /xgh-track
# Regenerate:   /xgh-track --regenerate appstore-cli
#
# Roles: reviews (user reviews), releases (build status), metrics
# Great for: iOS/macOS indie devs shipping to the App Store
# ─────────────────────────────────────────────────────────────

service: appstore
mode: cli
binary: appstoreconnect       # or xcrun altool, asc (various CLIs)
cursor_strategy: iso8601

auth:
  type: api_key
  token_env: ASC_API_KEY      # App Store Connect API key

apps:
  - bundle_id: com.example.myapp
    name: My App
    sources:
      - reviews               # New user reviews + ratings
      - releases              # Build processing, review status, release
      - metrics               # Downloads, crashes, revenue (daily snapshot)

  - bundle_id: com.example.widget
    name: My Widget
    sources:
      - reviews
      - releases
