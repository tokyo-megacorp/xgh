# ─────────────────────────────────────────────────────────────
# Claude Code Agent Provider
# ─────────────────────────────────────────────────────────────
# Mode: cli (parses Claude Code session JSONL files from disk)
# Generated by: /xgh-track
# Regenerate:   /xgh-track --regenerate claude-agent-cli
#
# Roles: sessions (what did the agent work on?),
#        decisions (architectural choices made),
#        artifacts (code/plans/specs produced)
#
# This makes xgh a meta-agent — it tracks what other AI agents
# are doing across your projects.
#
# Great for: multi-agent workflows, overnight Codex runs,
#            cross-agent memory sharing
# ─────────────────────────────────────────────────────────────

service: claude-agent
mode: cli
binary: cat                    # reads JSONL files directly
cursor_strategy: iso8601

# ── Session sources ──────────────────────────────────────────
# Claude Code stores session history as JSONL in project dirs.
# This provider scans those files for recent activity.

sources:
  sessions:
    paths:
      - ~/.claude/projects/*/       # All project session dirs
    file_pattern: "*.jsonl"
    parse: jsonl
    filter:
      role: assistant
      min_timestamp: "{cursor}"

  decisions:
    # Architectural decisions stored in lossless-claude
    tool: lcm_search
    params:
      query: "decision OR architecture OR chose OR tradeoff"
      tags: ["reasoning"]
      limit: 20

  artifacts:
    paths:
      - .xgh/specs/
      - .xgh/plans/
      - .xgh/context-tree/decisions/
    file_pattern: "*.md"
    filter:
      modified_after: "{cursor}"
