# Example: GitHub CLI provider (generated by /xgh-track)
# This is a reference example — do NOT copy manually. Run /xgh-track instead.

service: github
mode: cli
binary: gh
cursor_strategy: iso8601

# ── Repos to monitor ────────────────────────────────────────
# Each repo declares which data sources to fetch and optional filters.
# Sources map to gh CLI commands:
#   pull_requests  → gh pr list --search "updated:>CURSOR"
#   issues         → gh issue list --search "updated:>CURSOR"
#   actions        → gh run list --created ">CURSOR"
#   security_alerts→ gh api /repos/O/R/dependabot/alerts (per-alert data, filtered by updated_at)
#   dependabot     → gh api /repos/O/R/vulnerability-alerts (enabled/disabled status check)
#   discussions    → gh api graphql (discussions query)
#   releases       → gh release list
#   mentions       → gh search issues --mention @me
#   notifications  → gh api /notifications (global)

repos:
  # PRIMARY PROJECT
  - owner: tokyo-megacorp
    repo: xgh
    sources: [pull_requests, issues, discussions, actions, security_alerts, releases]
    watch_prs:
      # Specific PR numbers (track these always)
      - 19
      - 21
      # Search queries — auto-discover matching PRs
      - "search:provider"
      - "search:trigger"
    watch_issues:
      - "search:architecture"
      - "search:label:bug"
    filters:
      # Only fetch if modified after 2 days ago (local tuning)
      max_age_days: 2

  # SECONDARY PROJECT — CLI support tool
  - owner: mksglu
    repo: context-mode
    sources: [pull_requests, issues, releases]
    watch_prs:
      - 133
      - "search:memory"
      - "search:sandbox"
    watch_issues:
      - "search:context-window"
    filters:
      max_age_days: 7

  # DEPENDENCY — runtime system
  - owner: rtk-ai
    repo: rtk
    sources: [releases, issues]
    watch_issues:
      - "search:performance"
    filters:
      max_age_days: 14

  # UPSTREAM DEPENDENCY — AI framework
  - owner: anthropics
    repo: claude-sdk-python
    sources: [releases]
    filters:
      # Only track major/minor releases (skip patch by date filter)
      max_age_days: 30

# ── Global patterns ────────────────────────────────────────
# Optional global search that spans all watched repos
global_patterns:
  - "search:mentions"      # Notifications that mention you
  - "search:label:urgent"  # Any urgent issue across repos
  - "search:is:merged"     # Recent merges (for learning)
